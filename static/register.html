<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - DeepAgentForce</title>
    <!-- 本地字体 -->
    <link href="fonts/inter.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #212121;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #333333;
            --bg-input: #323232;
            
            --text-primary: #ececf1;
            --text-secondary: #ababab;
            --text-muted: #6d6d6d;
            
            --accent-primary: #19c37d;
            --accent-hover: #1db87a;
            --accent-muted: rgba(25, 195, 125, 0.15);
            
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-light: rgba(255, 255, 255, 0.08);
            --border-medium: rgba(255, 255, 255, 0.12);
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
            
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(25, 195, 125, 0.2);
            
            --transition-fast: 150ms;
            --transition-normal: 250ms;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Background gradient */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(25, 195, 125, 0.12), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(25, 195, 125, 0.08), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-primary), #10a060);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Alert */
        .alert {
            padding: 14px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .alert.show { display: flex; }

        .alert.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .alert.success {
            background: var(--accent-muted);
            border: 1px solid rgba(25, 195, 125, 0.3);
            color: var(--accent-primary);
        }

        .alert svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Form */
        .form-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: color var(--transition-fast);
        }

        .input-icon svg {
            width: 18px;
            height: 18px;
        }

        .input-icon.valid { color: var(--accent-primary); }
        .input-icon.error { color: #ef4444; }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 14px 14px 46px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            outline: none;
            transition: all var(--transition-fast);
        }

        input::placeholder { color: var(--text-muted); }

        input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-muted);
        }

        input:focus ~ .input-icon,
        .input-wrap:focus-within .input-icon {
            color: var(--accent-primary);
        }

        input.error {
            border-color: #ef4444;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .input-icon-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            transition: color var(--transition-fast);
        }

        .input-icon-toggle:hover { color: var(--text-secondary); }

        .input-icon-toggle svg {
            width: 18px;
            height: 18px;
        }

        /* Password strength */
        .password-strength {
            height: 4px;
            border-radius: 2px;
            background: var(--bg-tertiary);
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: var(--accent-primary); width: 100%; }

        .strength-text {
            font-size: 12px;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .strength-text.show { opacity: 1; }

        /* Error text */
        .error-text {
            color: #ef4444;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .error-text.show { display: block; }

        /* Hint */
        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Form row */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-group .btn {
            flex: 1;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-loading .btn-text { display: none; }
        .btn-loading .spinner { display: block; }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-subtle);
        }

        /* Link */
        .link {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .link a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover {
            text-decoration: underline;
        }

        /* Divider */
        .success-checkmark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 60px;
            height: 60px;
            background: var(--accent-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-checkmark.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .success-checkmark svg {
            width: 30px;
            height: 30px;
            color: white;
        }

        /* Skip link */
        .skip-link {
            text-align: center;
            margin-top: 16px;
        }

        .skip-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
        }

        .skip-link a:hover {
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 520px) {
            .card {
                padding: 32px 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="logo-text">DeepAgentForce</span>
        </div>

        <!-- Header -->
        <div class="header">
            <h1 id="formTitle">创建账号</h1>
            <p id="formSubtitle">开启您的智能研究之旅</p>
        </div>

        <!-- Alert -->
        <div class="alert" id="alertBox"></div>

        <!-- Form -->
        <form id="registerForm">

            <!-- User Info -->
            <div class="form-section active" id="sectionUser">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="input-wrap">
                        <span class="input-icon" id="usernameIcon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" id="username" placeholder="3-20个字符，可使用字母、数字、下划线" required minlength="3" maxlength="20">
                    </div>
                    <div class="error-text" id="usernameError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <div class="input-wrap">
                        <span class="input-icon" id="emailIcon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                        </span>
                        <input type="email" id="email" placeholder="用于找回密码和接收通知" required>
                    </div>
                    <div class="error-text" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input type="password" id="password" placeholder="至少6个字符" required minlength="6">
                        <button type="button" class="input-icon-toggle" id="pwToggle">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                    <div class="error-text" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <div class="input-wrap">
                        <span class="input-icon" id="confirmIcon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </span>
                        <input type="password" id="confirmPassword" placeholder="再次输入密码" required>
                    </div>
                    <div class="error-text" id="confirmError"></div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="btn-text">创建账号</span>
                    <div class="spinner"></div>
                </button>
            </div>

        </form>

        <div class="divider">或</div>

        <div class="link">
            已有账号？<a href="/login.html">立即登录</a>
        </div>

        <!-- Success Animation -->
        <div class="success-checkmark" id="successCheck">
            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
    </div>
</div>

<script>
    const API_BASE = localStorage.getItem('api_base') || `${window.location.protocol}//${window.location.hostname}:8000/api`;

    // Check if already logged in
    if (localStorage.getItem('access_token')) {
        window.location.href = '/index.html';
    }

    // Elements
    const username = document.getElementById('username');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');

    // Password toggle
    const pwToggle = document.getElementById('pwToggle');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyeOpenSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeCloseSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    pwToggle.addEventListener('click', () => {
        const isPassword = password.type === 'password';
        password.type = isPassword ? 'text' : 'password';
        eyeIcon.innerHTML = isPassword ? eyeCloseSVG : eyeOpenSVG;
    });

    // Real-time validation
    username.addEventListener('input', () => {
        const valid = /^[a-zA-Z0-9_]{3,20}$/.test(username.value);
        toggleIcon('username', valid);
    });

    email.addEventListener('input', () => {
        const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
        toggleIcon('email', valid);
    });

    confirmPassword.addEventListener('input', () => {
        const valid = confirmPassword.value === password.value && confirmPassword.value.length > 0;
        toggleIcon('confirm', valid);
    });

    function toggleIcon(field, isValid) {
        const icon = document.getElementById(field + 'Icon');
        if (icon) {
            icon.classList.toggle('valid', isValid);
            icon.classList.toggle('error', !isValid && icon.classList.contains('valid'));
        }
    }

    // Password strength
    password.addEventListener('input', () => {
        const val = password.value;
        const bar = document.getElementById('strengthBar');
        const text = document.getElementById('strengthText');

        let strength = 0;
        if (val.length >= 6) strength++;
        if (val.length >= 8) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9]/.test(val)) strength++;
        if (/[^A-Za-z0-9]/.test(val)) strength++;

        bar.className = 'strength-bar';
        text.classList.remove('show');

        if (val.length === 0) {
            bar.style.width = '0';
            return;
        }

        text.classList.add('show');

        if (strength <= 2) {
            bar.classList.add('strength-weak');
            text.textContent = '密码强度：弱';
            text.style.color = '#ef4444';
        } else if (strength <= 3) {
            bar.classList.add('strength-medium');
            text.textContent = '密码强度：中等';
            text.style.color = '#f59e0b';
        } else {
            bar.classList.add('strength-strong');
            text.textContent = '密码强度：强';
            text.style.color = '#19c37d';
        }
    });

    // Show/hide error
    function showError(id, msg) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.classList.add('show');
    }

    function hideError(id) {
        document.getElementById(id).classList.remove('show');
    }

    // Form submission
    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const usernameVal = username.value.trim();
        const emailVal = email.value.trim();
        const passwordVal = password.value;

        alertBox.className = 'alert';
        alertBox.innerHTML = '';

        // Client-side validation
        let hasError = false;

        if (!/^[a-zA-Z0-9_]{3,20}$/.test(usernameVal)) {
            showError('usernameError', '用户名必须为3-20个字符，只能包含字母、数字和下划线');
            username.classList.add('error');
            setTimeout(() => username.classList.remove('error'), 400);
            hasError = true;
        } else {
            hideError('usernameError');
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
            showError('emailError', '请输入有效的邮箱地址');
            email.classList.add('error');
            setTimeout(() => email.classList.remove('error'), 400);
            hasError = true;
        } else {
            hideError('emailError');
        }

        if (passwordVal.length < 6) {
            showError('passwordError', '密码至少6个字符');
            password.classList.add('error');
            setTimeout(() => password.classList.remove('error'), 400);
            hasError = true;
        } else {
            hideError('passwordError');
        }

        if (passwordVal !== confirmPassword.value) {
            showError('confirmError', '两次输入的密码不一致');
            confirmPassword.classList.add('error');
            setTimeout(() => confirmPassword.classList.remove('error'), 400);
            hasError = true;
        } else {
            hideError('confirmError');
        }

        if (hasError) return;

        submitBtn.disabled = true;
        submitBtn.classList.add('btn-loading');

        try {
            const response = await fetch(`${API_BASE}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: usernameVal,
                    email: emailVal,
                    password: passwordVal,
                }),
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || '注册失败');
            }

            if (data.success) {
                document.getElementById('successCheck').classList.add('show');
                alertBox.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 注册成功！正在跳转...';
                alertBox.className = 'alert success show';

                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.user));

                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1500);
            } else {
                throw new Error(data.error || '注册失败');
            }
        } catch (error) {
            alertBox.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' + error.message;
            alertBox.className = 'alert error show';
            submitBtn.disabled = false;
            submitBtn.classList.remove('btn-loading');
        }
    });
</script>
</body>
</html>
