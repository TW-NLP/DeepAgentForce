<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - DeepAgentForce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #212121;
      --bg-secondary: #2d2d2d;
      --bg-tertiary: #333333;
      --bg-input: #323232;
      
      --text-primary: #ececf1;
      --text-secondary: #ababab;
      --text-muted: #6d6d6d;
      
      --accent-primary: #19c37d;
      --accent-hover: #1db87a;
      --accent-muted: rgba(25, 195, 125, 0.15);
      
      --border-subtle: rgba(255, 255, 255, 0.05);
      --border-light: rgba(255, 255, 255, 0.08);
      --border-medium: rgba(255, 255, 255, 0.12);
      
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;
      
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 30px rgba(25, 195, 125, 0.2);
      
      --transition-fast: 150ms;
      --transition-normal: 250ms;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* Background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(25, 195, 125, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(25, 195, 125, 0.08), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* Layout */
    .page {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    /* Left Panel - Branding */
    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      position: absolute;
      top: 36px;
      left: 48px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent-primary), #10a060);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-glow);
    }

    .brand-icon svg {
      width: 20px;
      height: 20px;
      color: white;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      max-width: 400px;
    }

    .hero-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent-primary), #10a060);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      box-shadow: var(--shadow-glow);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .hero-icon svg {
      width: 40px;
      height: 40px;
      color: white;
    }

    .hero h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Features */
    .features {
      display: flex;
      gap: 24px;
      margin-top: 48px;
      justify-content: center;
    }

    .feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .feature-icon {
      width: 44px;
      height: 44px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .feature-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Right Panel - Form */
    .right-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-subtle);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
    }

    .card-header {
      margin-bottom: 32px;
    }

    .card-header h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .card-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color var(--transition-fast);
    }

    .input-icon svg {
      width: 18px;
      height: 18px;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 14px 14px 14px 46px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-size: 15px;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: all var(--transition-fast);
    }

    input::placeholder { color: var(--text-muted); }

    input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px var(--accent-muted);
    }

    input:focus ~ .input-icon,
    .input-wrap:focus-within .input-icon {
      color: var(--accent-primary);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      transition: color var(--transition-fast);
    }

    .pw-toggle:hover { color: var(--text-secondary); }

    .pw-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* Alert */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .alert.show { display: flex; }

    .alert.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .alert.success {
      background: var(--accent-muted);
      border: 1px solid rgba(25, 195, 125, 0.3);
      color: var(--accent-primary);
    }

    .alert svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--accent-primary);
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      color: white;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-glow);
    }

    .btn-submit:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }

    /* Footer */
    .card-footer {
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .card-footer a {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .card-footer a:hover {
      text-decoration: underline;
    }

    /* Status indicators */
    .status-dots {
      display: flex;
      gap: 24px;
      margin-top: 40px;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-dot::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent-primary);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-primary);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .left-panel {
        display: none;
      }

      .right-panel {
        border-left: none;
      }

      html, body {
        overflow: auto;
      }

      .page {
        height: auto;
        min-height: 100vh;
      }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- LEFT PANEL - Branding -->
  <div class="left-panel">

    <div class="brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="brand-name">DeepAgentForce</span>
    </div>

    <div class="hero">
      <div class="hero-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>智能研究助手</h1>
      <p>由 AI 驱动的智能研究平台，帮助您加速洞察、提升效率、做出更好的决策。</p>

      <div class="features">
        <div class="feature">
          <div class="feature-icon">🦀</div>
          <span class="feature-text">AI Agent</span>
        </div>
        <div class="feature">
          <div class="feature-icon">📚</div>
          <span class="feature-text">知识库</span>
        </div>
        <div class="feature">
          <div class="feature-icon">🔍</div>
          <span class="feature-text">RAG 检索</span>
        </div>
      </div>
    </div>

    <div class="status-dots">
      <div class="status-dot">系统运行正常</div>
      <div class="status-dot">数据加密中</div>
    </div>

  </div>

  <!-- RIGHT PANEL - Login Form -->
  <div class="right-panel">
    <div class="login-card">

      <div class="card-header">
        <h2>欢迎回来 👋</h2>
        <p>登录到您的 DeepAgentForce 账户</p>
      </div>

      <div class="alert" id="alertBox" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="alertText"></span>
      </div>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="username">用户名 / 邮箱</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" id="username" placeholder="请输入用户名或邮箱" autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="显示/隐藏密码">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="loginBtn">
          <div class="btn-inner">
            <span id="btnText">登 录</span>
            <div class="spinner" id="spinner"></div>
          </div>
        </button>

      </form>

      <div class="divider">或</div>

      <div class="card-footer">
        还没有账号？<a href="register.html">立即注册</a>
      </div>

    </div>
  </div>

</div>

<script>
  const API_BASE = localStorage.getItem('api_base') ||
    `${location.protocol}//${location.hostname}:8000/api`;

  if (localStorage.getItem('access_token')) location.href = '/index.html';

  // Password toggle
  const pwInput = document.getElementById('password');
  const pwToggle = document.getElementById('pwToggle');
  const eyeIcon = document.getElementById('eyeIcon');

  const eyeOpenSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const eyeCloseSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

  pwToggle.addEventListener('click', () => {
    const isPassword = pwInput.type === 'password';
    pwInput.type = isPassword ? 'text' : 'password';
    eyeIcon.innerHTML = isPassword ? eyeCloseSVG : eyeOpenSVG;
  });

  // Alert helper
  function showAlert(msg, type = 'error') {
    const alertText = document.getElementById('alertText');
    const alertBox = document.getElementById('alertBox');
    alertText.textContent = msg;
    alertBox.className = `alert ${type} show`;
  }

  function hideAlert() {
    document.getElementById('alertBox').className = 'alert';
  }

  // Login form
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();

    const username = document.getElementById('username').value.trim();
    const password = pwInput.value;

    if (!username || !password) {
      showAlert('请填写用户名和密码');
      return;
    }

    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');

    loginBtn.disabled = true;
    btnText.textContent = '登录中...';
    spinner.style.display = 'block';

    try {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || '登录失败，请检查账号和密码');

      if (data.success) {
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        localStorage.setItem('user', JSON.stringify(data.user));

        showAlert('登录成功！正在跳转...', 'success');
        setTimeout(() => { location.href = '/index.html'; }, 800);
      } else {
        throw new Error(data.error || '登录失败');
      }
    } catch (err) {
      showAlert(err.message);
      loginBtn.disabled = false;
      btnText.textContent = '登 录';
      spinner.style.display = 'none';
    }
  });
</script>
</body>
</html>
